name: CI

on: [push]

jobs:
  # Build Hugo site and run Cypress E2E tests
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Read Hugo version from .tool-versions
        id: hugo-version
        run: |
          HUGO_VERSION=$(grep hugo hugo-site/.tool-versions | awk '{print $2}')
          echo "HUGO_VERSION=${HUGO_VERSION}" >> $GITHUB_OUTPUT

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '${{ steps.hugo-version.outputs.HUGO_VERSION }}'
          extended: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: hugo-site/package-lock.json
      
      - name: Install Hugo dependencies
        run: |
          cd hugo-site
          npm ci
      
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      
      - name: Run Cypress tests
        uses: cypress-io/github-action@v4
        with:
          command: npm run test:e2e:ci
          working-directory: hugo-site
